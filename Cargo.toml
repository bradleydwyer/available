[package]
name = "available"
version = "0.1.0"
edition = "2024"
description = "AI-powered project name finder — generates names via LLMs and checks domain + package registry availability"
license = "MIT"

[dependencies]
caucus-core = { path = "../caucus/crates/caucus-core" }
domain-check = { path = "../domain-check" }
pkg-check = { path = "../pkg-check" }
clap = { version = "4", features = ["derive"] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rmcp = { version = "0.12", features = ["server", "macros", "transport-io"] }
schemars = "1"
anyhow = "1"
